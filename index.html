<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Resource Portal</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --q-color: #e67e22;
            --a-color: #27ae60;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); min-height: 95vh; }
        
        h1 { text-align: center; color: var(--primary); }

        /* Navigation Tabs */
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .tab-btn { padding: 10px 15px; border: none; background: #dfe6e9; color: var(--primary); cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--secondary); color: white; }

        /* Content Sections */
        .subject-content { display: none; text-align: center; animation: fadeIn 0.4s; }
        .subject-content.active { display: block; }
        
        .type-toggle { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .type-btn { padding: 10px 20px; border: 2px solid #ddd; background: white; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .type-btn.active.q { border-color: var(--q-color); color: var(--q-color); }
        .type-btn.active.a { border-color: var(--a-color); color: var(--a-color); }

        /* Unit Grid */
        .unit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 20px auto; max-width: 800px; }
        .unit-btn { padding: 12px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .unit-btn:hover { background: var(--secondary); color: white; border-color: var(--secondary); }

        /* Viewer */
        .viewer-container { width: 100%; height: 750px; border: 2px solid #ddd; border-radius: 10px; background: #fff; display: none; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Academic Resource Portal</h1>

    <div class="tabs" id="subjectTabs">
        <button class="tab-btn active" onclick="switchSubject(this, 'finance')">Business Finance</button>
        <button class="tab-btn" onclick="switchSubject(this, 'working')">Working Capital</button>
        <button class="tab-btn" onclick="switchSubject(this, 'laws')">Industrial Relations</button>
        <button class="tab-btn" onclick="switchSubject(this, 'ecomm')">E-Commerce</button>
        <button class="tab-btn" onclick="switchSubject(this, 'invest')">Investment Mgt</button>
    </div>

    <div class="type-toggle">
        <button class="type-btn q active" onclick="switchType('Q')">Questions</button>
        <button class="type-btn a" onclick="switchType('A')">Answers</button>
    </div>

    <hr>

    <div id="unitDisplay">
        <h3 id="currentSelectionTitle">Business Finance - Questions</h3>
        <div class="unit-grid" id="unitGrid">
            </div>
    </div>

    <div id="viewerBox" class="viewer-container">
        <iframe id="pdfFrame" src=""></iframe>
    </div>
</div>

<script>
    let currentSubject = 'finance';
    let currentType = 'Q';

    const unitConfig = {
        'finance': { name: 'Business Finance', units: 5 },
        'working': { name: 'Working Capital', units: 5 },
        'laws': { name: 'Industrial Relations', units: 4 },
        'ecomm': { name: 'E-Commerce', units: 1 },
        'invest': { name: 'Investment Mgt', units: 1 }
    };

    function switchSubject(btn, subKey) {
        currentSubject = subKey;
        // Update UI
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderUnits();
    }

    function switchType(type) {
        currentType = type;
        // Update UI
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.type-btn.${type.toLowerCase()}`).classList.add('active');
        renderUnits();
    }

    function renderUnits() {
        const grid = document.getElementById('unitGrid');
        const title = document.getElementById('currentSelectionTitle');
        const viewer = document.getElementById('viewerBox');
        
        viewer.style.display = 'none'; // Hide viewer when changing
        grid.innerHTML = '';
        
        const config = unitConfig[currentSubject];
        const typeText = currentType === 'Q' ? 'Questions' : 'Answers';
        title.innerText = `${config.name} - ${typeText}`;

        for (let i = 1; i <= config.units; i++) {
            const btn = document.createElement('button');
            btn.className = 'unit-btn';
            btn.innerText = `Unit ${i}`;
            // This is where you would map your specific Google Drive IDs
            btn.onclick = () => loadPDF(currentSubject, currentType, i);
            grid.appendChild(btn);
        }
    }

    function loadPDF(subject, type, unit) {
        const viewer = document.getElementById('viewerBox');
        const frame = document.getElementById('pdfFrame');
        
        // Logical naming for your IDs
        // You will need to create a mapping object here with your real File IDs
        const fileId = "PASTE_YOUR_FILE_ID_HERE"; 
        
        frame.src = `https://drive.google.com/file/d/${fileId}/preview`;
        viewer.style.display = 'block';
        viewer.scrollIntoView({ behavior: 'smooth' });
    }

    // Initialize the first view
    renderUnits();
</script>

</body>
</html>
