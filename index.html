<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Resource Portal</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --question-color: #e67e22;
            --answer-color: #27ae60;
            --light: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .tab-btn { padding: 12px 20px; border: none; background: #dfe6e9; color: var(--primary); cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--secondary); color: white; }

        .subject-content { display: none; }
        .subject-content.active { display: block; }
        
        .button-group { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .view-btn { padding: 10px 25px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .q-btn { background: var(--question-color); }
        .a-btn { background: var(--answer-color); }

        /* The Embed Viewer Styling */
        .viewer-container { width: 100%; height: 600px; border: 2px solid #ddd; border-radius: 10px; overflow: hidden; background: #eee; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .placeholder-text { text-align: center; color: #7f8c8d; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Question & Answer Bank</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openSubject(event, 'finance')">Business Finance</button>
        <button class="tab-btn" onclick="openSubject(event, 'working')">Working Capital</button>
        <button class="tab-btn" onclick="openSubject(event, 'laws')">Employment Laws</button>
        <button class="tab-btn" onclick="event, openSubject(event, 'ecomm')">E-Commerce</button>
        <button class="tab-btn" onclick="event, openSubject(event, 'invest')">Investment Mgt</button>
    </div>

    <div id="finance" class="subject-content active">
        <div class="button-group">
            <button class="view-btn q-btn" onclick="loadPDF('finance-viewer', 'YOUR_QUESTION_FILE_ID')">View Questions</button>
            <button class="view-btn a-btn" onclick="loadPDF('finance-viewer', 'YOUR_ANSWER_FILE_ID')">View Answers</button>
        </div>
        <div id="finance-viewer" class="viewer-container">
            <iframe src=""></iframe>
        </div>
    </div>

    </div>

<script>
    function openSubject(evt, subjectName) {
        var i, content, tablinks;
        content = document.getElementsByClassName("subject-content");
        for (i = 0; i < content.length; i++) {
            content[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        document.getElementById(subjectName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function loadPDF(containerId, fileId) {
        const container = document.getElementById(containerId);
        const iframe = container.querySelector('iframe');
        
        // This URL format allows embedding
        const embedUrl = `https://drive.google.com/file/d/${fileId}/preview`;
        
        iframe.src = embedUrl;
        container.style.display = 'block';
    }
</script>

</body>
</html>
